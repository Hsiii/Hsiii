<svg xmlns="http://www.w3.org/2000/svg" width="124" height="28" viewBox="0 0 124 28" role="img" aria-label="Figma swapping with Affinity and Procreate">
  <title>Figma / Affinity / Procreate</title>
  <style>
    .stack { animation: swap-3 9s ease-in-out infinite; }
    .slot text { font: 700 10px Verdana, Geneva, DejaVu Sans, sans-serif; text-rendering: geometricPrecision; }
    .figma-bg { fill: #f24e1e; }
    .affinity-bg { fill: #a7f175; }
    .procreate-bg { fill: #000; }
    .ink { fill: #fff; }
    .dark { fill: #222; }
    @keyframes swap-3 {
      0%, 28% { transform: translateY(0); }
      33%, 61% { transform: translateY(-28px); }
      66%, 94% { transform: translateY(-56px); }
      100% { transform: translateY(-84px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .stack { animation: none; }
      .slot:nth-child(n+2) { display: none; }
    }
  </style>
  <clipPath id="badge-clip"><rect width="124" height="28"/></clipPath>
  <g clip-path="url(#badge-clip)">
  <g class="stack">
    <g class="slot">
      <rect class="figma-bg" width="124" height="28"/>
      <g class="ink">
        <circle cx="12" cy="10" r="4"/>
        <circle cx="20" cy="10" r="4"/>
        <circle cx="12" cy="18" r="4"/>
        <circle cx="20" cy="18" r="4"/>
        <path d="M12 22a4 4 0 0 1 0-8z"/>
      </g>
      <text class="ink" x="32" y="18" text-anchor="start">FIGMA</text>
    </g>
    <g class="slot" transform="translate(0 28)">
      <rect class="affinity-bg" width="124" height="28"/>
      <path d="M112.908 165.979c-10.413 0-17.037-6.317-17.037-14.329 0-34.287 90.164-41.151 90.164-77.563 0-22.213-25.731-31.787-58.577-31.787-19.98 0-42.571 3.698-63.552 10.315v43.438c30.919-22.52 65.272-32.16 87.4-32.16 13.914 0 23.355 3.882 23.355 10.838 0 28.658-124.353 24.117-124.353 86.042 0 23.736 16.321 37.335 39.283 37.335 34.732 0 61.003-33.753 80.657-74.897l3.982 1.43c-10.351 25.143-31.771 52.712-35.943 70.434h44.715v-91.685h-10.327c-14.99 32.574-36.957 62.59-59.767 62.59" fill="#000" fill-rule="nonzero" transform="translate(9 7) scale(.058333)"/>
      <text class="dark" x="32" y="18" text-anchor="start">AFFINITY</text>
    </g>
    <g class="slot" transform="translate(0 56)">
      <rect class="procreate-bg" width="124" height="28"/>
      <image x="9" y="7" width="14" height="14" href="data:image/png;base64,"/>
      <text class="ink" x="32" y="18" text-anchor="start">PROCREATE</text>
    </g>
    <g class="slot" transform="translate(0 84)">
      <rect class="figma-bg" width="124" height="28"/>
      <g class="ink">
        <circle cx="12" cy="10" r="4"/>
        <circle cx="20" cy="10" r="4"/>
        <circle cx="12" cy="18" r="4"/>
        <circle cx="20" cy="18" r="4"/>
        <path d="M12 22a4 4 0 0 1 0-8z"/>
      </g>
      <text class="ink" x="32" y="18" text-anchor="start">FIGMA</text>
    </g>
  </g>
  </g>
</svg>
